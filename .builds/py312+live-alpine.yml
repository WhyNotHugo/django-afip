image: alpine/3.20
packages:
  - alpine-sdk
  - font-dejavu # makedepends for wheels
  - ghostscript # makedepends for wheels
  - libpq-dev # makedepends for wheels
  - mariadb # server itself
  - mariadb-dev # lib for wheels
  - mariadb-openrc
  - pango # makedepends for wheels
  - postgresql
  - postgresql-common-openrc # tests
  - py3-tox
  - python3-dev
  - libxml2-dev
  - libxslt-dev
  - libffi-dev
  - build-base
  - jpeg-dev
  - zlib-dev
sources:
  - https://github.com/WhyNotHugo/django-afip
environment:
  CI: true
  # Forzamos la compilación de estas librerías para evitar el SegFault (error -11)
  PIP_NO_BINARY: mysqlclient,cryptography,lxml
tasks:
  - postgres: |
      sudo service postgresql start
  - mariadb: |
      sudo sed -i 's/skip-networking/skip-grant-tables/' /etc/my.cnf.d/mariadb-server.cnf
      sudo /etc/init.d/mariadb setup
      sudo service mariadb start
  - tox-sqlite: |
      cd django-afip
      tox -e sqlite
  - tox-django52-mariadb: |
      cd django-afip
      tox -e py312-django52-mysql
  - tox-django60-mariadb: |
      cd django-afip
      tox -e py312-django60-mysql
  - tox-django52-postgres: |
      cd django-afip
      tox -e py312-django52-postgres
  - tox-django60-postgres: |
      cd django-afip
      tox -e py312-django60-postgres
  - lint: |
      cd django-afip
      tox -e mypy,ruff,vermin
  - tox-docs: |
      cd django-afip
      tox -e docs
  - tox-live: |
      cd django-afip
      tox -e live
